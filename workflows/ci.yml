name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/dotnet/sdk:10.0

  services:
    redis:
      image: redis
      options: >-
        --health-cmd "redis-cli ping"
        --health-interval 10s
        --health-timeout 5s
        --health-retries 5

  steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Test
      run: dotnet test -c Release --no-restore
